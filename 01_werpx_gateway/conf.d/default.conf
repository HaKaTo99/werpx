server {
    listen 80;
    server_name localhost;

    # 1. Routing for ERPNext (Core Operasional)
    location / {
        proxy_pass http://werpx_core_python:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_addrs;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 2. Routing for SIMAPROX Executive Dashboard (React)
    location /exec/ {
        proxy_pass http://werpx_exec_mobile:3000/;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # 3. Routing for Rust Forge Engine (Audit API)
    location /audit/ {
        proxy_pass http://werpx_engine_rust:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    # Custom Error Pages for Stability
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
